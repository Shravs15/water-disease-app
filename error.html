{% extends 'base.html' %}
{% block title %}Error – AquaRisk{% endblock %}
{% block page_title %}Error{% endblock %}
{% block content %}
<div style="text-align:center;padding:60px 20px">
  <i class="fa-solid fa-triangle-exclamation" style="font-size:48px;color:var(--red);margin-bottom:16px;display:block"></i>
  <div style="font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;margin-bottom:10px">Access Denied</div>
  <div style="color:var(--muted);margin-bottom:24px">{{ message }}</div>
  <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
    <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
  </a>
</div>
{% endblock %}
